<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FE暗黒竜と光の剣 戦闘計算ツール</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .description {
      text-align: center;
      color: #2c3e50;
    }

    h2 {
      border-left: 5px solid #2c3e50;
      padding-left: 10px;
      font-size: 20px;
      margin-top: 30px;
      color: #2c3e50;
      background: #ecf0f1;
      padding: 5px 10px;
    }

    .container {
      max-width: 800px;
      width: 90%;
      margin: auto;
    }

    .box {
      background: #ffffff;
      padding: 20px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
    }

    .row label {
      width: 120px;
    }

    .row input,
    .row select {
      flex: 1;
    }

    .flex {
      display: flex;
      gap: 20px;
      width: 100%;
    }

    .flex .box {
      flex: 1;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #34495e;
    }

    .tabs {
      margin-top: 20px;
    }

    .tabs button {
      margin-right: 5px;
      padding: 8px 12px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .result {
      margin-top: 10px;
      padding: 10px;
      background: #ecf0f1;
      border-radius: 5px;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .flex {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>FE暗黒竜と光の剣 戦闘計算ツール</h1>

  <p class="description">
    戦闘時のダメージ・命中・必殺・追撃などを計算できます
  </p>

  <h2>ステータス入力</h2>

  <div class="flex">

    <!-- 自分 -->
    <div>
      <h2>自分</h2>
      <div class="box">

        <div class="row"><label>攻撃力</label><input type="number" id="attack" value="10"></div>
        <div class="row"><label>技</label><input type="number" id="skill" value="10"></div>
        <div class="row"><label>速さ</label><input type="number" id="playerSpeed" value="10"></div>
        <div class="row"><label>運</label><input type="number" id="critLuck" value="10"></div>

        <div class="row">
          <label>武器</label>
          <select id="playerWeapon"></select>
        </div>

      </div>
    </div>

    <!-- 相手 -->
    <div>
      <h2>相手</h2>
      <div class="box">

        <div class="row"><label>守備</label><input type="number" id="defense" value="10"></div>
        <div class="row"><label>速さ</label><input type="number" id="enemySpeed" value="10"></div>
        <div class="row"><label>運</label><input type="number" id="luck" value="10"></div>
        <div class="row"><label>魔防</label><input type="number" id="resistance" value="0"></div>

        <div class="row">
          <label>武器</label>
          <select id="enemyWeapon"></select>
        </div>

        <div class="row">
          <label>クラス</label>
          <select id="enemyType">
            <option value="normal">その他</option>
            <option value="armor">アーマー</option>
            <option value="snight">騎馬</option>
            <option value="flying">飛行</option>
            <option value="dragon_flying">竜騎</option>
            <option value="Ballistician">シューター</option>
            <option value="Manakete">マムクート</option>
            <option value="EarthDragon">地竜</option>
          </select>
        </div>

        <div class="row">
          <label>地形</label>
          <select id="terrain">
            <option value="0">なし</option>
            <option value="30">城・海</option>
            <option value="25">山</option>
            <option value="20">砦</option>
            <option value="15">林</option>
            <option value="5">草原</option>
          </select>
        </div>

      </div>
    </div>

  </div>

  <!-- タブ -->
  <div class="tabs">
    <button onclick="showTab('damage')">ダメージ</button>
    <button onclick="showTab('hit')">命中</button>
    <button onclick="showTab('double')">追撃</button>
    <button onclick="showTab('crit')">必殺</button>
  </div>

  <!-- 各タブ -->
  <div id="damage" class="tab-content">
    <h2>ダメージ</h2>
    <div class="box">
      必要な値：自分の攻撃力、相手の守備力、相手の魔防、自分の武器、相手クラス<br><br>
      <button id="calcBtn">計算</button>
      <p id="result" class="result"></p>
    </div>
  </div>

  <div id="hit" class="tab-content">
    <h2>命中</h2>
    <div class="box">
      必要な値：自分の技、相手の速さ、相手の運、自分の武器、相手の武器、相手クラス、相手の地形<br><br>
      <button onclick="calculateHit()">計算</button>
      <p id="hitResult" class="result"></p>
    </div>
  </div>

  <div id="double" class="tab-content">
    <h2>追撃</h2>
    <div class="box">
      必要な値：自分の速さ、相手の速さ、自分の武器、相手の武器<br><br>
      <button onclick="checkDouble()">判定</button>
      <p id="doubleResult" class="result"></p>
    </div>
  </div>

  <div id="crit" class="tab-content">
    <h2>必殺</h2>
    <div class="box">
      必要な値：自分の速さ、相手の運、自分の武器<br><br>
      <button onclick="calculateCrit()">計算</button>
      <p id="critResult" class="result"></p>
    </div>
  </div>

  <br><br>
  <a href="index.html">← ホームに戻る</a>

</div>

<script src="ankoku-ryu.js"></script>

</body>
</html>
